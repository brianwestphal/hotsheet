name: Release Desktop App

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # Final release tags only (e.g. v1.2.3)
      # RC tags (v*-rc.*) are handled by release-candidate.yml

  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true

jobs:
  # Create the GitHub Release first so build jobs don't race
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract release notes from tag
        id: tag_notes
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          # User-authored tag annotation (if any). Empty when the tag is
          # lightweight or carries no body — the platform-download section
          # below stands on its own in that case so the release page never
          # falls back to a generic "See the assets below" stub (HS-7963).
          NOTES=$(git tag -l --format='%(contents)' "$TAG" | sed '/^$/d')

          {
            if [ -n "$NOTES" ]; then
              echo "$NOTES"
              echo ""
            fi
            echo "## Download"
            echo ""
            echo "### macOS"
            echo "- [Apple Silicon (.dmg)](${BASE}/HotSheet-${VERSION}-macOS-Apple-Silicon.dmg) — M-series Macs"
            echo "- [Intel (.dmg)](${BASE}/HotSheet-${VERSION}-macOS-Intel.dmg) — older Macs"
            echo ""
            echo "### Linux"
            echo "- [Debian / Ubuntu (.deb)](${BASE}/Hot.Sheet_${VERSION}_amd64.deb)"
            echo "- [AppImage](${BASE}/Hot.Sheet_${VERSION}_amd64.AppImage) — runs on most distros, no install needed"
            echo "- [Red Hat / Fedora (.rpm)](${BASE}/Hot.Sheet-${VERSION}-1.x86_64.rpm)"
            echo ""
            echo "### Windows"
            echo "- [Installer (.exe)](${BASE}/Hot.Sheet_${VERSION}_x64-setup.exe)"
            echo "- [MSI](${BASE}/Hot.Sheet_${VERSION}_x64_en-US.msi) — for managed-deployment environments"
            echo ""
            echo "Not sure which to pick? On macOS use the Apple Silicon build unless you have a 2019-or-older Intel Mac. On Linux pick the AppImage if you don't recognise the others. If a direct link 404s, the build for that platform may have failed — every shipped asset is also listed under \"Assets\" below."
            echo ""
            echo "---"
            echo "**npm:** \`npm install -g hotsheet@${VERSION}\` — works everywhere Node 20+ runs but lacks the embedded terminal and a few other native-only features the installable builds ship with."
          } > /tmp/release-notes.md

          echo "body<<ENDOFNOTES" >> "$GITHUB_OUTPUT"
          cat /tmp/release-notes.md >> "$GITHUB_OUTPUT"
          echo "ENDOFNOTES" >> "$GITHUB_OUTPUT"

      # HS-8465 — always create as a draft. A non-draft release is
      # immediately visible to the public AND immediately flips GitHub's
      # `releases/latest` pointer, but the platform `build` matrix below
      # takes 10–30 minutes to upload bundles + `rename-assets` runs
      # after that, so every direct download URL embedded in the release
      # notes 404s for the entire build window. Worse, the Tauri updater
      # (`src-tauri/tauri.conf.json` endpoint
      # `/releases/latest/download/latest.json`) and the §50 in-app
      # upgrade nudge (`api.github.com/.../releases/latest`) both
      # resolve via that flipped pointer and start serving the
      # half-published release to real users mid-build. GitHub skips
      # drafts for both the public Releases page AND the `latest`
      # pointer, so keeping the release as a draft until the very end
      # holds the entire publication atomic — the prior stable release
      # remains the user-visible "latest" right up until the final
      # `publish-release` job flips `draft:false`. Maintainers can still
      # see the in-progress draft at /releases while logged in.
      - name: Create release (as draft — flipped by publish-release at end)
        id: create
        uses: actions/github-script@v9
        env:
          RELEASE_BODY: ${{ steps.tag_notes.outputs.body }}
        with:
          script: |
            const tag = '${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Hot Sheet ${tag}`,
              body: process.env.RELEASE_BODY,
              draft: true,
              prerelease: false,
            });
            return data.id;

  # HS-8907 — the Apple Foundation Models helper is no longer compiled from our
  # own Swift on a macOS-26 preview runner. It now ships prebuilt + signed +
  # notarized inside the `apple-fm` npm package, and build-sidecar.sh copies it
  # from node_modules into the staged server dir during the normal build. The
  # separate `apple-fm-helper` job (and its Xcode-26 dependency) is gone.
  build:
    needs: [create-release]
    if: ${{ !cancelled() && needs.create-release.result == 'success' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      # HS-8829 — run the Rust unit tests on this OS before the (long, signed)
      # bundle build, so the per-OS `#[cfg(target_os)]` command builders execute
      # on macOS / ubuntu / windows and a Rust regression fails the job fast.
      - name: Rust unit tests
        run: npm run test:rust
        shell: bash

      - name: Build sidecar
        run: bash scripts/build-sidecar.sh ${{ matrix.target }}
        shell: bash

      # HS-8907 — build-sidecar.sh already copied the prebuilt apple-fm helper
      # from node_modules into src-tauri/server (arm64 macOS only). Just confirm
      # it landed and activate verify-bundle's hard assertion; `npm ci` ran above
      # so it should always be present now (no Xcode-26 / artifact dependency).
      - name: Confirm Apple FM helper bundled (arm64 macOS)
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          if [ -f src-tauri/server/apple-fm-helper ]; then
            chmod +x src-tauri/server/apple-fm-helper
            echo "EXPECT_APPLE_FM_HELPER=1" >> "$GITHUB_ENV"
            echo "Apple FM helper bundled: $(wc -c < src-tauri/server/apple-fm-helper) bytes."
          else
            echo "Apple FM helper absent after build-sidecar — bundle omits it (non-fatal; on-device Apple FM disabled this build)."
          fi

      # macOS-only: pre-sign native binaries embedded in the sidecar's
      # bundled node_modules BEFORE tauri-action runs. Tauri's macOS bundler
      # signs the main binary + externalBin (the hotsheet-node sidecar)
      # but does NOT recursively sign Mach-O modules inside the resource
      # tree — and Apple's notary scans the whole .app and rejects the
      # submission as "Invalid" if it finds unsigned Mach-O. node-pty
      # ships two native binaries inside prebuilds/darwin-{x64,arm64}/:
      # `pty.node` (a Node N-API addon, already signed by node-pty's own
      # CI) and `spawn-helper` (a tiny launcher executable, no extension,
      # NOT pre-signed by upstream). We pre-sign both with the same
      # Developer ID cert tauri-action will use so the whole .app passes
      # notary in a single submission. Hardened runtime (`--options
      # runtime`) is required because the parent .app uses it.
      # See release-candidate.yml's `build` job for the matching step
      # (the unified rc + beta workflow per HS-8464) + HS-8419 notes on
      # the precise notary log that named the failing binaries.
      - name: Pre-sign native binaries (macOS)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          # macOS runners default to bash 3.x which lacks `mapfile`; use a
          # newline-delimited string + portable `while IFS= read` loop.
          # HS-8876 → HS-8907 — also sign `apple-fm-helper` (the Apple Foundation
          # Models helper from the `apple-fm` package, copied into src-tauri/server/
          # on arm64). apple-fm ships it signed with its OWN identity; re-signing
          # with ours here is required so the notary accepts it inside our bundle —
          # same reason as node-pty's spawn-helper. Search all of server/ (not just
          # node_modules) so the helper at server/apple-fm-helper is caught.
          NODE_BINS=$(find src-tauri/server \( -name '*.node' -o -name 'spawn-helper' -o -name 'apple-fm-helper' \) -type f 2>/dev/null || true)
          if [ -z "$NODE_BINS" ]; then
            echo "No native binaries under src-tauri/server — nothing to pre-sign."
            exit 0
          fi
          COUNT=$(printf '%s\n' "$NODE_BINS" | wc -l | tr -d ' ')
          echo "Found ${COUNT} native binaries to pre-sign:"
          printf '%s\n' "$NODE_BINS" | sed 's/^/  /'

          KEYCHAIN="$RUNNER_TEMP/presign.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | xargs)

          printf '%s\n' "$NODE_BINS" | while IFS= read -r bin; do
            codesign --force --options runtime --timestamp \
              --sign "$APPLE_SIGNING_IDENTITY" "$bin"
            codesign --verify --verbose "$bin"
          done
          echo "All ${COUNT} native binaries pre-signed."

      - name: Build Tauri app and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing & notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

      # HS-8868 — fail the release if the produced bundle can't launch (real Node
      # sidecar + bootable server resources), catching the HS-8867 0-byte-sidecar
      # class on the shipped artifact (the npm-package smoke job never runs the
      # desktop bundle).
      - run: node scripts/verify-bundle.mjs ${{ matrix.target }}
        shell: bash

  # Rename installer assets to human-friendly names.
  # Only .dmg files are safe to rename — the updater's latest.json references
  # .exe, .msi, .deb, .AppImage, and .rpm by their original filenames.
  # macOS updates use .app.tar.gz instead, so .dmg renames are safe.
  rename-assets:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Rename release assets
        uses: actions/github-script@v9
        with:
          script: |
            const releaseId = ${{ needs.create-release.outputs.release_id }};
            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              per_page: 100,
            });

            const renames = [
              [/_aarch64\.dmg$/, '-macOS-Apple-Silicon.dmg'],
              [/_x64\.dmg$/, '-macOS-Intel.dmg'],
            ];

            for (const asset of assets) {
              for (const [pattern, suffix] of renames) {
                if (pattern.test(asset.name)) {
                  const newName = asset.name
                    .replace(/^Hot\.Sheet_/, 'HotSheet-')
                    .replace(pattern, suffix);
                  console.log(`Renaming: ${asset.name} → ${newName}`);
                  await github.rest.repos.updateReleaseAsset({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    asset_id: asset.id,
                    name: newName,
                  });
                  break;
                }
              }
            }

  # HS-8465 — atomic flip of the release from draft → published.
  #
  # Final job in the pipeline. Runs only after every platform build has
  # uploaded its bundles AND `rename-assets` has renamed the .dmg files
  # to their human-friendly names that the release notes link to. At
  # this point the draft release has all of its assets in place, so
  # flipping `draft:false` is the single atomic moment when:
  #   - The release page becomes publicly visible at
  #     /releases/tag/<tag> (every embedded direct-download link
  #     resolves immediately — no broken-link window).
  #   - GitHub's `releases/latest` pointer moves to this release.
  #   - The Tauri updater starts seeing the new `latest.json`
  #     (`src-tauri/tauri.conf.json` endpoint).
  #   - The §50 in-app upgrade nudge starts pointing users at this
  #     release's platform assets.
  #
  # `make_latest: 'true'` is the API equivalent of GitHub's "Set as the
  # latest release" checkbox — explicit so the flip can't be silently
  # downgraded by repo-level settings.
  publish-release:
    needs: [create-release, build, rename-assets]
    runs-on: ubuntu-latest
    steps:
      - name: Flip release from draft → published
        uses: actions/github-script@v9
        with:
          script: |
            const releaseId = ${{ needs.create-release.outputs.release_id }};
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              draft: false,
              make_latest: 'true',
            });
            console.log(`Release ${releaseId} flipped from draft → published`);
