name: Release Beta

# Triggered by `v*-beta.*` tags created via `bash scripts/release.sh --beta`.
# Publishes a pre-release: npm with `--tag beta` (so `npm install hotsheet@beta`
# works) and a GitHub Release flagged `prerelease: true` (so the Tauri updater
# + §50 upgrade-nudge keep pointing at the prior stable, since GitHub's
# `releases/latest` skips prereleases automatically).
#
# Differences from release-candidate.yml:
# - No promote phase, no workflow_dispatch to release-desktop.yml.
# - Tauri bundles are uploaded directly to the GH Release inside this workflow,
#   not via the separate release-desktop.yml flow (which hardcodes
#   `prerelease: false`).
#
# HS-8458 — every beta cut runs the same smoke matrix as the RC (treat every
# beta as if it could be promoted to production), since betas have shipped
# regressions that only the smoke tests would catch (HS-8457 / HS-8422 was
# the trigger: 24 betas + an RC silently exited on the npm-install symlink
# path without anyone noticing — the RC workflow's smoke jobs caught it but
# only at promote-time, by which point we'd already eaten the cycle to get
# there). Smoke jobs run AFTER beta-publish so the build artifact always
# exists for debugging even when smoke fails — the workflow goes red and
# the maintainer can yank `--tag beta` manually if needed. The upgrade
# test is `latest production stable → new beta` (NOT beta-to-beta — users
# on a beta are already opted into the experimental track; the path that
# actually matters is the stable user trying out a beta).

permissions:
  contents: write
  id-token: write  # Required for npm OIDC trusted publishing

on:
  push:
    tags:
      - 'v*-beta.*'

concurrency:
  group: release-beta
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # --- Phase 1: Validation (parallel) ---

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run build:client
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run lint

  npm-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run build
      - run: npm pack --dry-run

  # --- Phase 2: Extract version + create the prerelease shell ---

  create-release:
    needs: [test, e2e, lint, npm-dry-run]
    runs-on: ubuntu-latest
    outputs:
      beta_version: ${{ steps.version.outputs.beta_version }}
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract beta version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          BETA_VERSION="${TAG#v}"
          echo "beta_version=$BETA_VERSION" >> "$GITHUB_OUTPUT"
          echo "Beta version: $BETA_VERSION"

      - name: Build release notes body
        id: notes
        env:
          TAG: ${{ github.ref_name }}
          BETA_VERSION: ${{ steps.version.outputs.beta_version }}
          REPO: ${{ github.repository }}
        run: |
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          NOTES=$(git tag -l --format='%(contents)' "$TAG" | sed '/^$/d')

          {
            echo "> **Beta / pre-release.** This build is opt-in. The Tauri auto-updater and the in-app upgrade nudge will continue to point at the prior stable release."
            echo ""
            if [ -n "$NOTES" ]; then
              echo "$NOTES"
              echo ""
            fi
            echo "## Try it out"
            echo ""
            echo "**npm:** \`npm install -g hotsheet@${BETA_VERSION}\` (or \`hotsheet@beta\` for the latest beta)"
            echo ""
            echo "**Desktop bundles:** see Assets below."
          } > /tmp/beta-notes.md

          echo "body<<ENDOFNOTES" >> "$GITHUB_OUTPUT"
          cat /tmp/beta-notes.md >> "$GITHUB_OUTPUT"
          echo "ENDOFNOTES" >> "$GITHUB_OUTPUT"

      - name: Create prerelease
        id: create
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ steps.notes.outputs.body }}
        with:
          script: |
            const tag = '${{ github.ref_name }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Hot Sheet ${tag} (beta)`,
              body: process.env.RELEASE_BODY,
              draft: false,
              prerelease: true,
              make_latest: 'false',
            });
            return data.id;

  # --- Phase 3: Publish npm with --tag beta ---

  beta-publish:
    needs: create-release
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
        with: { ref: '${{ github.ref }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Set version and publish beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm version "${{ needs.create-release.outputs.beta_version }}" --no-git-tag-version --allow-same-version
          npm run build
          npm publish --tag beta --provenance --access public

  # --- Phase 4: Build Tauri bundles + upload to the prerelease ---

  build:
    needs: create-release

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: '${{ matrix.target }}' }

      - if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf

      - run: npm ci

      # Match release.sh's beta path: bump the in-tree version to
      # {ver}-beta.{N} BEFORE building so the Tauri bundles carry the right
      # version string. tauri.conf.json + Cargo.toml read from package.json
      # via `version = '../package.json'` so updating package.json suffices
      # for the JS side; we still bump tauri.conf.json + Cargo.toml directly
      # for the Rust side.
      - name: Set version for bundle build
        shell: bash
        run: |
          VER="${{ needs.create-release.outputs.beta_version }}"
          npm version "$VER" --no-git-tag-version --allow-same-version

          if [ -f src-tauri/tauri.conf.json ]; then
            node -e "
              const fs = require('fs');
              const f = 'src-tauri/tauri.conf.json';
              const c = JSON.parse(fs.readFileSync(f, 'utf8'));
              c.version = process.argv[1];
              fs.writeFileSync(f, JSON.stringify(c, null, 2) + '\n');
            " "$VER"
          fi

          if [ -f src-tauri/Cargo.toml ]; then
            # Use a portable sed that works on both BSD (mac) and GNU (linux/win runners).
            node -e "
              const fs = require('fs');
              const p = 'src-tauri/Cargo.toml';
              const t = fs.readFileSync(p, 'utf8').replace(/^version = \".*\"/m, 'version = \"' + process.argv[1] + '\"');
              fs.writeFileSync(p, t);
            " "$VER"
          fi

      - run: bash scripts/build-sidecar.sh ${{ matrix.target }}
        shell: bash

      # macOS-only: codesign every native `.node` binary embedded in the
      # sidecar's bundled node_modules BEFORE tauri-action runs. Tauri's
      # bundler signs the main binary + externalBin (the Node sidecar) but
      # does NOT recursively sign Mach-O native modules inside the resource
      # tree (e.g. `node-pty`'s `pty.node`). Apple's notary service scans
      # the entire .app and rejects the submission as "Invalid" if it
      # finds an unsigned Mach-O — which is what happened on v0.17.0-beta.11
      # (the first beta to ship the embedded terminal's `node-pty` binary;
      # the prior stable v0.16.2 was tagged ~4 hours before that dep was
      # added to the bundle). We pre-sign with the same Developer ID
      # certificate that tauri-action will use for the main bundle so the
      # whole .app passes notary in a single submission. Hardened runtime
      # is required (`--options runtime`) because the parent .app uses it.
      # Decode the same `.p12` tauri-action uses and import it into a
      # temporary keychain so `codesign` can find it before tauri-action
      # gets its turn (tauri-action manages its OWN keychain after this
      # step runs, but the certificate is in the login keychain at this
      # point because we just imported it). NOTE: tauri-action will also
      # do its full signing pass on top of these pre-signed .node files,
      # which `codesign --force` upstream tolerates.
      - name: Pre-sign native .node binaries (macOS)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          # Inventory first so the CI log clearly shows what we're about
          # to sign (and stays useful for diagnosing future notary "Invalid"
          # cases). Bail early if there's nothing to sign — that means a
          # future bundle reshuffle dropped node-pty entirely.
          # macOS runners default to bash 3.x which lacks `mapfile`; use a
          # newline-delimited string + portable `while IFS= read` loop.
          # NOTE: include `spawn-helper` (no extension) in addition to .node
          # files. node-pty ships a tiny darwin/linux launcher binary at
          # prebuilds/darwin-{x64,arm64}/spawn-helper that is a real Mach-O
          # executable but isn't a Node native addon, so our prior
          # `-name '*.node'` filter missed it. Apple's notary log on
          # v0.17.0-beta.14 made this explicit: 6 errors (binary unsigned
          # / no secure timestamp / hardened runtime not enabled) all on
          # the two spawn-helpers, none on pty.node (which node-pty's own
          # CI publishes pre-signed). The `\( ... -o ... \)` group must
          # come BEFORE `-type f` for portable find behavior.
          NODE_BINS=$(find src-tauri/server/node_modules \( -name '*.node' -o -name 'spawn-helper' \) -type f 2>/dev/null || true)
          if [ -z "$NODE_BINS" ]; then
            echo "No native binaries under src-tauri/server/node_modules — nothing to pre-sign."
            exit 0
          fi
          COUNT=$(printf '%s\n' "$NODE_BINS" | wc -l | tr -d ' ')
          echo "Found ${COUNT} native binaries to pre-sign:"
          printf '%s\n' "$NODE_BINS" | sed 's/^/  /'

          # Import the same .p12 tauri-action uses into a temporary keychain
          # so codesign can resolve $APPLE_SIGNING_IDENTITY. tauri-action
          # will re-import into its own keychain after this; that's fine —
          # macOS allows multiple keychains carrying the same identity.
          KEYCHAIN="$RUNNER_TEMP/presign.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | xargs)

          printf '%s\n' "$NODE_BINS" | while IFS= read -r bin; do
            codesign --force --options runtime --timestamp \
              --sign "$APPLE_SIGNING_IDENTITY" "$bin"
            codesign --verify --verbose "$bin"
          done
          echo "All ${COUNT} native binaries pre-signed."

      # Windows MSI bundler requires the optional pre-release identifier in
      # the app version to be numeric-only (e.g. `0.17.0-1`). Beta tags use
      # the semver-standard `0.17.0-beta.N` form, which fails the MSI version
      # check with: "optional pre-release identifier in app version must be
      # numeric-only and cannot be greater than 65535 for msi target". So we
      # skip MSI on Windows betas and ship the NSIS `.exe` installer only.
      # NSIS has no such version-format restriction. Stable releases (built
      # by release-desktop.yml on `v[0-9]*` tags) still produce both NSIS
      # and MSI because the version has no pre-release identifier. Pattern
      # ported from glassbox GB-772 where the same Tauri/MSI constraint was
      # hit on the first beta release; the conditional append keeps the
      # other targets' args unchanged.
      - name: Build Tauri app and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}${{ matrix.target == 'x86_64-pc-windows-msvc' && ' --bundles nsis' || '' }}

  # --- Phase 5: Smoke tests against the just-published beta (HS-8458) ---
  #
  # Same shape as release-candidate.yml's smoke phases. The boot block uses
  # the HS-8457 ready-poll pattern (capture stdout, poll `/` for up to 30s,
  # dump the log on failure) so a future silent-exit regression is visible
  # in the CI log instead of looking like a slow boot.

  smoke-fresh:
    needs: beta-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Install beta globally and start server
        run: |
          for i in 1 2 3 4 5; do
            npm install -g hotsheet@${{ needs.create-release.outputs.beta_version }} && break
            echo "Attempt $i failed, waiting 15s for npm registry propagation..."
            sleep 15
          done
          hotsheet --data-dir /tmp/smoke-fresh --no-open --port 4195 > /tmp/hotsheet-fresh.log 2>&1 &
          HS_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4195/ > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            if ! kill -0 $HS_PID 2>/dev/null; then
              echo "::error::Server process died before binding to port 4195"
              echo "--- server log ---"
              cat /tmp/hotsheet-fresh.log
              exit 1
            fi
            sleep 1
          done
          echo "::error::Server did not bind to port 4195 within 30s"
          echo "--- server log ---"
          cat /tmp/hotsheet-fresh.log
          exit 1

      - name: Run fresh install smoke tests
        run: SMOKE_PORT=4195 npx playwright test --config playwright.config.smoke.ts e2e/smoke/fresh-install.spec.ts

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/hotsheet-fresh.log 2>/dev/null || echo "no log"

      - name: Stop server
        if: always()
        run: kill $(lsof -ti:4195) 2>/dev/null || true

  smoke-upgrade:
    needs: beta-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npx playwright install chromium --with-deps

      # Upgrade path: latest production stable → new beta. `npm install -g
      # hotsheet` (no version) resolves the `latest` dist-tag, which is the
      # current production release; the `beta` dist-tag is separate.
      - name: Install stable version and seed data
        run: |
          npm install -g hotsheet
          hotsheet --data-dir /tmp/smoke-upgrade --no-open --port 4195 > /tmp/hotsheet-stable.log 2>&1 &
          HS_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4195/ > /dev/null 2>&1; then break; fi
            if ! kill -0 $HS_PID 2>/dev/null; then
              echo "::error::Stable hotsheet died before binding"; cat /tmp/hotsheet-stable.log; exit 1
            fi
            sleep 1
          done
          bash scripts/seed-upgrade-data.sh 4195
          kill $(lsof -ti:4195) 2>/dev/null || true
          sleep 2

      - name: Upgrade to beta and start server
        run: |
          for i in 1 2 3 4 5; do
            npm install -g hotsheet@${{ needs.create-release.outputs.beta_version }} && break
            echo "Attempt $i failed, waiting 15s for npm registry propagation..."
            sleep 15
          done
          hotsheet --data-dir /tmp/smoke-upgrade --no-open --port 4195 > /tmp/hotsheet-upgrade.log 2>&1 &
          HS_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4195/ > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            if ! kill -0 $HS_PID 2>/dev/null; then
              echo "::error::Server process died before binding to port 4195"
              echo "--- server log ---"
              cat /tmp/hotsheet-upgrade.log
              exit 1
            fi
            sleep 1
          done
          echo "::error::Server did not bind to port 4195 within 30s"
          echo "--- server log ---"
          cat /tmp/hotsheet-upgrade.log
          exit 1

      - name: Run upgrade smoke tests
        run: SMOKE_PORT=4195 npx playwright test --config playwright.config.smoke.ts e2e/smoke/upgrade-install.spec.ts

      - name: Dump server log on failure
        if: failure()
        run: |
          echo "--- stable log ---"; cat /tmp/hotsheet-stable.log 2>/dev/null || echo "(none)"
          echo "--- upgrade log ---"; cat /tmp/hotsheet-upgrade.log 2>/dev/null || echo "(none)"

      - name: Stop server
        if: always()
        run: kill $(lsof -ti:4195) 2>/dev/null || true
