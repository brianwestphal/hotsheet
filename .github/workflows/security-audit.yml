name: Security audit

# HS-8601 — automated dependency security auditing (npm + cargo).
#
# This is a DEDICATED workflow rather than a job inside release-candidate.yml on
# purpose: release-candidate.yml only triggers on `v*-rc.*` / `v*-beta.*` tags,
# so it could only catch an advisory at release time. Security advisories are
# disclosed independently of our release cadence, so auditing belongs on every
# PR + push to main + a weekly schedule (and on-demand via workflow_dispatch) so
# a newly-disclosed advisory in a shipped dependency surfaces promptly instead
# of waiting for the next release.
#
# npm-audit is BLOCKING as of HS-8602: the production npm tree is clean —
# `npm audit --omit=dev --audit-level=high` reports 0 vulnerabilities after the
# HS-8602 dependency bumps (@modelcontextprotocol/sdk 1.27.1 -> 1.29.0 pulled in
# path-to-regexp 8.4.2 + qs 6.15.2, clearing the previously-unreachable bundled
# Express 5 advisories; ws -> 8.21.0, marked -> 18.0.4, hono -> 4.12.23). The
# only residual advisories are 3 moderate dev-only items in the nyc -> uuid
# coverage chain, which `--omit=dev` excludes and `--audit-level=high` ignores.
#
# cargo-audit is BLOCKING as of HS-8649: the src-tauri crate baseline is clean at
# the `vulnerability` level — `cargo audit` reports 0 vulnerabilities after the
# HS-8649 bumps (rustls-webpki 0.103.9 -> 0.103.13 cleared RUSTSEC-2026-0104 /
# -0098 / -0099 / -0049; tar 0.4.44 -> 0.4.46 cleared RUSTSEC-2026-0067 / -0068).
# The 21 residual advisories are `unmaintained` / `unsound` informational
# warnings (Linux-only gtk-rs GTK3 bindings, plus unmaintained transitive utility
# crates) — plain `cargo audit` does NOT fail on those, and each is justified in
# docs/dependency-security.md.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'   # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    # BLOCKING (HS-8602): production tree is clean at high severity. If this
    # job goes red, a newly-disclosed high/critical advisory has landed in a
    # SHIPPED dependency — triage it (and, if unreachable, document the
    # justification in docs/dependency-security.md) before merging.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm }
      - run: npm ci
      # Production tree only, high severity. The dev toolchain (eslint / vitest /
      # nyc / sass / tsup / esbuild …) never ships in dist/ or the Tauri sidecar,
      # so `--omit=dev` keeps the signal focused on what actually ships. The 3
      # residual moderate advisories (nyc -> istanbul-lib-processinfo -> uuid)
      # are dev-only AND below the high threshold, so they don't gate.
      - run: npm audit --omit=dev --audit-level=high

  cargo-audit:
    runs-on: ubuntu-latest
    # BLOCKING (HS-8649): the src-tauri baseline is clean at the `vulnerability`
    # level. If this job goes red, a newly-disclosed advisory has landed in a
    # SHIPPED crate — bump to the fixed version (or, if provably unreachable,
    # document the justification in docs/dependency-security.md) before merging.
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # `cargo install` compiles cargo-audit from source (~1-2 min). If CI time
      # becomes a concern, swap for a prebuilt-binary installer
      # (e.g. taiki-e/install-action@cargo-audit) — kept as a plain install here
      # to avoid taking on another third-party action dependency.
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # Audits src-tauri/Cargo.lock against the RustSec advisory DB. Nothing
      # checked the shipped desktop binary's crates before HS-8601.
      - run: cargo audit
