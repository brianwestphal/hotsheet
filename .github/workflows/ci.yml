name: CI

# Push / PR gate (HS — e2e-drift catch). Until this workflow existed, lint +
# unit + e2e ran ONLY on `v*-rc.*` / `v*-beta.*` release tags via
# release-candidate.yml — so regressions (notably stale e2e mocks drifting from
# the typed-API zod response schemas) accumulated undetected between releases
# and only surfaced when a release was already in flight. This runs the same
# checks on every push to `main` and every PR, using the credential-free
# `:fast` script variants (per CLAUDE.md): they skip the live-GitHub-integration
# / plugin-credential tests that need secrets CI doesn't have, but still run the
# full unit suite and the full non-credential e2e suite — which is where the
# typed-API/mock drift shows up.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel a superseded run when new commits land on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm test

  # HS-8829 — Rust unit tests (`src-tauri/`) for the Tauri crate. Previously ran
  # ONLY locally on the maintainer's Mac (never in CI), so the per-OS command
  # builders (build_tts_command / build_kill_command / build_quicklook_command)
  # had no continuous gate. This runs them on every push/PR. The crate links
  # WebKitGTK on Linux, so the same apt deps the release matrices install are
  # needed to compile the test binary. (The release matrices also run cargo test
  # on macOS + Windows for true per-OS execution.)
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf
      - run: npm run test:rust

  # HS-9141 — the e2e suite is split into two jobs. The terminal/PTY/OSC specs
  # are timing-sensitive (real escape-sequence round-trips through a live PTY) and
  # cascade under the shared server on GH's constrained 2-CPU runner (the suite is
  # healthy locally — see HS-9141). Running them on their OWN job gives them a
  # fresh server + the full runner, and keeps a terminal cascade from taking down
  # the rest of the e2e suite (where the typed-API/mock-drift signal lives). The
  # split is driven by `E2E_SCOPE` (see playwright.config.ts).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run build:client
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e:fast
        env:
          E2E_SCOPE: no-terminal

  e2e-terminal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run build:client
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e:fast
        env:
          E2E_SCOPE: terminal

  # HS-9140 / HS-9139 / HS-9142 — merged (unit + e2e server + e2e browser)
  # coverage + the threshold gate. Heavy (full unit suite + two instrumented e2e
  # passes + nyc merge), so it runs only on push to main (post-merge baseline +
  # regression gate), not on every PR. `scripts/test-all.sh` runs e2e in two
  # passes (no-terminal then terminal, each on a fresh server) so terminal-e2e
  # coverage is folded in without a flake wedging the shared capture. It prints
  # the merged "All files" row and ends with an `nyc check-coverage` gate; the
  # floors below sit ~2-3 pts under the measured merged baseline. Raise as
  # coverage improves after a green run.
  coverage:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # No E2E_SCOPE here — HS-9142 test-all.sh runs both e2e passes (no-terminal
      # + terminal) internally so terminal-e2e coverage is folded into the merge.
      # Floors are ~2-3 pts below the first green merged run (run 28320784494:
      # lines 93.09 / stmts 77.95 / funcs 69.58 / branches 68.01) — they stay safe
      # as terminal-e2e coverage only raises the merged numbers. Raise as coverage
      # improves; absorbs run-to-run variation (a flaked e2e test drops a few lines).
      COVERAGE_MIN_LINES: '90'
      COVERAGE_MIN_STATEMENTS: '74'
      COVERAGE_MIN_FUNCTIONS: '66'
      COVERAGE_MIN_BRANCHES: '65'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:all
