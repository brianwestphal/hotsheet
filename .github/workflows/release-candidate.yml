name: Release

# Unified release workflow — HS-8464.
#
# Triggered by both `v*-rc.*` (release candidate, cut by `bash scripts/release.sh`)
# and `v*-beta.*` (beta, cut by `bash scripts/release.sh --beta`) tags. Single
# workflow because npm allows exactly one trusted publisher per package and it's
# filename-scoped — keeping the file named `release-candidate.yml` (rather than
# renaming) preserves the existing npmjs.org trusted-publisher binding so neither
# tag track needs an `NPM_TOKEN` secret to publish. All `npm publish` invocations
# below intentionally omit `NODE_AUTH_TOKEN` so the npm CLI uses the OIDC token
# minted via the `id-token: write` permission instead of a long-lived token. See
# HS-8464 for the merge history + the token-expired regression that triggered it.
#
# Tag → behavior:
#   - `v*-rc.*`    → validation → tauri-build gate → publish → smoke → promote → dispatch release-desktop.yml
#   - `v*-beta.*`  → validation → tauri-build gate → publish → smoke
#                                                  → create-release + signed `build` (uploads to prerelease) in parallel
#
# Beta tags do NOT run the `promote` phase (betas stay on the `beta` dist-tag
# and do not flip `latest`) and do NOT dispatch `release-desktop.yml` — instead
# the beta-only `build` job produces signed Tauri bundles and uploads them
# directly to the GitHub Release shell that `create-release` creates with
# `prerelease: true`. GitHub's `releases/latest` skips prereleases, so the
# Tauri updater + §50 upgrade nudge keep pointing at the prior stable release.
#
# Beta tags DO run smoke (per HS-8458 + HS-8464 follow-up decision) — same
# rationale as for RCs: the same install/upgrade regression class can ship
# through a beta, and a user running `npm install -g hotsheet@beta` is hitting
# the exact code path the smoke jobs exercise.

permissions:
  contents: write
  actions: write   # rc-only `promote` step dispatches release-desktop.yml
  id-token: write  # npm OIDC trusted publishing (replaces NPM_TOKEN — see HS-8464)

on:
  push:
    tags:
      - 'v*-rc.*'
      - 'v*-beta.*'

# Two concurrency groups so an in-flight rc and an in-flight beta never block
# each other — but two rcs (or two betas) in quick succession do cancel the
# older. Matches the pre-merge behavior of the two separate workflows.
concurrency:
  group: release-${{ contains(github.ref, '-beta.') && 'beta' || 'rc' }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # === Phase 1: Validation (parallel, both tag types) ===

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run build:client
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run lint

  npm-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run build
      - run: npm pack --dry-run

  tauri-build:
    # Unsigned Tauri build that gates `publish` for both tag tracks. Runs
    # against the committed package.json / tauri.conf.json version (the
    # release script does NOT bump in-tree versions for beta tags, and for
    # rc tags it bumps to the clean stable version with no pre-release
    # identifier), so the Windows MSI bundler's "pre-release identifier
    # must be numeric-only" check is never tripped here — the bundles
    # produced are debug-only and discarded; the real signed beta bundles
    # come from the `build` phase below which DOES do the bump and
    # therefore needs the MSI-skip conditional.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: '${{ matrix.target }}' }
      - if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf
      - run: npm ci
      # HS-8829 — execute the Rust unit tests on THIS OS before the long bundle
      # build, so the per-OS `#[cfg(target_os)]` branches are actually run (not
      # just compiled) on macOS / ubuntu / windows, and a Rust regression fails
      # the job fast.
      - run: npm run test:rust
        shell: bash
      - run: bash scripts/build-sidecar.sh ${{ matrix.target }}
        shell: bash
      - run: npx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      # HS-8868 — fail the gate if the produced bundle can't launch (real Node
      # sidecar + bootable server resources). Catches the HS-8867 0-byte-sidecar
      # class that the npm-package smoke test never exercises.
      - run: node scripts/verify-bundle.mjs ${{ matrix.target }}
        shell: bash
      - uses: actions/upload-artifact@v7
        with:
          name: tauri-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe

  # === Phase 2 (beta-only): Create the GitHub Release shell ===
  #
  # Beta path only. Creates the prerelease that the `build` job uploads
  # bundles to. The rc path doesn't need this — `promote` creates the
  # final clean tag, and `release-desktop.yml` (dispatched from `promote`)
  # owns its own release creation.

  create-release:
    if: contains(github.ref, '-beta.')
    needs: [test, e2e, lint, npm-dry-run, tauri-build]
    runs-on: ubuntu-latest
    outputs:
      beta_version: ${{ steps.version.outputs.beta_version }}
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract beta version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          BETA_VERSION="${TAG#v}"
          echo "beta_version=$BETA_VERSION" >> "$GITHUB_OUTPUT"
          echo "Beta version: $BETA_VERSION"

      - name: Build release notes body
        id: notes
        env:
          TAG: ${{ github.ref_name }}
          BETA_VERSION: ${{ steps.version.outputs.beta_version }}
          REPO: ${{ github.repository }}
        run: |
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          NOTES=$(git tag -l --format='%(contents)' "$TAG" | sed '/^$/d')

          {
            echo "> **Beta / pre-release.** This build is opt-in. The Tauri auto-updater and the in-app upgrade nudge will continue to point at the prior stable release."
            echo ""
            if [ -n "$NOTES" ]; then
              echo "$NOTES"
              echo ""
            fi
            echo "## Try it out"
            echo ""
            echo "**npm:** \`npm install -g hotsheet@${BETA_VERSION}\` (or \`hotsheet@beta\` for the latest beta)"
            echo ""
            echo "**Desktop bundles:** see Assets below."
          } > /tmp/beta-notes.md

          echo "body<<ENDOFNOTES" >> "$GITHUB_OUTPUT"
          cat /tmp/beta-notes.md >> "$GITHUB_OUTPUT"
          echo "ENDOFNOTES" >> "$GITHUB_OUTPUT"

      # HS-8465 — create as draft + prerelease. The downstream `build`
      # matrix takes 10–30 minutes to upload signed Tauri bundles to
      # this release, and embedded asset links in the release notes
      # would otherwise 404 for that entire window. Drafting holds the
      # prerelease page invisible until the final `publish-release`
      # job flips `draft:false`. `prerelease: true` stays set so this
      # release is skipped by GitHub's `releases/latest` pointer (the
      # Tauri updater + §50 upgrade nudge keep pointing at the prior
      # stable release) — drafting is the broken-link-window fix,
      # `prerelease` is the stable-channel-protection setting, and the
      # two are orthogonal. See release-desktop.yml's `create-release`
      # for the matching stable-release pattern.
      - name: Create prerelease (as draft — flipped by publish-release at end)
        id: create
        uses: actions/github-script@v9
        env:
          RELEASE_BODY: ${{ steps.notes.outputs.body }}
        with:
          script: |
            const tag = '${{ github.ref_name }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Hot Sheet ${tag} (beta)`,
              body: process.env.RELEASE_BODY,
              draft: true,
              prerelease: true,
              make_latest: 'false',
            });
            return data.id;

  # === Phase 3: Publish npm with --tag beta (both tag types) ===
  #
  # Uses npm OIDC trusted publishing — no `NODE_AUTH_TOKEN` env block, no
  # `NPM_TOKEN` secret reference. The trusted publisher configured at
  # npmjs.org against this workflow's filename mints a short-lived token
  # from the GitHub OIDC ID token, so this PUT cannot be broken by an
  # expired or rotated long-lived token (HS-8464 root cause).

  publish:
    needs: [test, e2e, lint, npm-dry-run, tauri-build]
    runs-on: ubuntu-latest
    environment: npm-publish
    outputs:
      version: ${{ steps.version.outputs.version }}
      base_version: ${{ steps.version.outputs.base_version }}
    steps:
      - uses: actions/checkout@v6
        with: { ref: '${{ github.ref }}' }
      - uses: actions/setup-node@v6
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # base_version only meaningful for rc tags — strips `-rc.N` to
          # give the clean stable version that `promote` will publish.
          # Harmless to compute on beta tags (no `-rc.N` to strip), it
          # just isn't consumed there.
          BASE_VERSION=$(echo "$VERSION" | sed 's/-rc\.[0-9]*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Base version (rc-only): $BASE_VERSION"

      - run: npm ci

      # npm's "Trusted Publishing" OIDC handshake (which authenticates the
      # PUT for a token-free `npm publish`) landed in npm 11.5.1. Node 20
      # ships npm 10.x, which knows how to attach a `--provenance`
      # sigstore attestation (separate flow that uses the runner's OIDC
      # token directly) but DOES NOT know how to use that OIDC token as
      # the bearer for the PUT — it falls through to whatever's in the
      # `.npmrc` `_authToken=` line that `actions/setup-node@v6` writes
      # when `NODE_AUTH_TOKEN` is unset (empty string), the registry
      # rejects empty auth, and npm helpfully reports the rejection as a
      # 404 to obscure package existence. Upgrading to npm 11+ here makes
      # the OIDC handshake actually happen. See HS-8464 follow-up.
      - name: Upgrade npm for OIDC trusted publishing (>=11.5.1)
        run: npm install -g npm@latest

      - name: Set version and publish beta
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version
          npm run build
          npm publish --tag beta --provenance --access public

  # === Phase 4 (beta-only): Signed Tauri bundles → prerelease ===
  #
  # Runs in parallel with `publish`. Bumps the in-tree version to the beta
  # version BEFORE building so the Tauri bundles carry the right version
  # string (release.sh's beta path intentionally skips the in-tree version
  # bump — see HS-8246 — so CI has to do it ephemerally here).

  # HS-8907 — the Apple Foundation Models helper now ships prebuilt + signed +
  # notarized inside the `apple-fm` npm package; build-sidecar.sh copies it from
  # node_modules during the normal build, so the separate macOS-26 compile job
  # (and its Xcode-26 dependency) is gone. See release-desktop.yml for the match.
  build:
    needs: [create-release]
    if: ${{ !cancelled() && needs.create-release.result == 'success' && contains(github.ref, '-beta.') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: '${{ matrix.target }}' }

      - if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf

      - run: npm ci

      # HS-8829 — run the Rust unit tests on this OS before building the signed
      # bundle (true per-OS execution of the `#[cfg(target_os)]` command builders).
      - run: npm run test:rust
        shell: bash

      - name: Set version for bundle build
        shell: bash
        run: |
          VER="${{ needs.create-release.outputs.beta_version }}"
          npm version "$VER" --no-git-tag-version --allow-same-version

          if [ -f src-tauri/tauri.conf.json ]; then
            node -e "
              const fs = require('fs');
              const f = 'src-tauri/tauri.conf.json';
              const c = JSON.parse(fs.readFileSync(f, 'utf8'));
              c.version = process.argv[1];
              fs.writeFileSync(f, JSON.stringify(c, null, 2) + '\n');
            " "$VER"
          fi

          if [ -f src-tauri/Cargo.toml ]; then
            # Use Node for cross-platform in-place replace (BSD/GNU sed differ).
            node -e "
              const fs = require('fs');
              const p = 'src-tauri/Cargo.toml';
              const t = fs.readFileSync(p, 'utf8').replace(/^version = \".*\"/m, 'version = \"' + process.argv[1] + '\"');
              fs.writeFileSync(p, t);
            " "$VER"
          fi

      - run: bash scripts/build-sidecar.sh ${{ matrix.target }}
        shell: bash

      # HS-8907 — build-sidecar.sh copied the prebuilt apple-fm helper from
      # node_modules into src-tauri/server (arm64 macOS only). Confirm + activate
      # verify-bundle's hard assertion. See release-desktop.yml.
      - name: Confirm Apple FM helper bundled (arm64 macOS)
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          if [ -f src-tauri/server/apple-fm-helper ]; then
            chmod +x src-tauri/server/apple-fm-helper
            echo "EXPECT_APPLE_FM_HELPER=1" >> "$GITHUB_ENV"
            echo "Apple FM helper bundled: $(wc -c < src-tauri/server/apple-fm-helper) bytes."
          else
            echo "Apple FM helper absent after build-sidecar — bundle omits it (non-fatal)."
          fi

      # macOS-only: codesign every native `.node` binary + node-pty's
      # `spawn-helper` Mach-O launcher embedded in the sidecar's bundled
      # node_modules BEFORE tauri-action runs. Tauri's bundler signs the
      # main binary + externalBin (the Node sidecar) but does NOT
      # recursively sign Mach-O native modules inside the resource tree
      # (e.g. `node-pty`'s `pty.node` + `spawn-helper`). Apple's notary
      # scans the entire .app and rejects the submission as "Invalid" if
      # it finds an unsigned Mach-O — that's the v0.17.0-beta.11 +
      # v0.17.0-beta.14 regression class (HS-8419 sweep 13 + d6bc215).
      # Pre-sign with the same Developer ID certificate that tauri-action
      # will use for the main bundle so the whole .app passes notary in a
      # single submission. Hardened runtime is required (`--options
      # runtime`) because the parent .app uses it. tauri-action does its
      # own signing pass on top of these pre-signed binaries, which
      # `codesign --force` upstream tolerates.
      - name: Pre-sign native .node binaries (macOS)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          # macOS runners default to bash 3.x which lacks `mapfile`; use a
          # newline-delimited string + portable `while IFS= read` loop.
          # Include `spawn-helper` (no extension) in addition to .node
          # files — see comment above for the notary-log evidence that
          # required this.
          # HS-8876 → HS-8907 — also sign `apple-fm-helper` (the Apple Foundation
          # Models helper from the `apple-fm` package, copied into src-tauri/server/
          # on arm64); re-sign with our identity so the notary accepts it in our
          # bundle (apple-fm signs it with its own identity).
          NODE_BINS=$(find src-tauri/server \( -name '*.node' -o -name 'spawn-helper' -o -name 'apple-fm-helper' \) -type f 2>/dev/null || true)
          if [ -z "$NODE_BINS" ]; then
            echo "No native binaries under src-tauri/server — nothing to pre-sign."
            exit 0
          fi
          COUNT=$(printf '%s\n' "$NODE_BINS" | wc -l | tr -d ' ')
          echo "Found ${COUNT} native binaries to pre-sign:"
          printf '%s\n' "$NODE_BINS" | sed 's/^/  /'

          KEYCHAIN="$RUNNER_TEMP/presign.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | xargs)

          printf '%s\n' "$NODE_BINS" | while IFS= read -r bin; do
            codesign --force --options runtime --timestamp \
              --sign "$APPLE_SIGNING_IDENTITY" "$bin"
            codesign --verify --verbose "$bin"
          done
          echo "All ${COUNT} native binaries pre-signed."

      # Windows MSI bundler requires the optional pre-release identifier
      # in the app version to be numeric-only (e.g. `0.17.0-1`). Beta
      # tags use the semver-standard `0.17.0-beta.N` form, which fails
      # the MSI version check ("optional pre-release identifier in app
      # version must be numeric-only and cannot be greater than 65535
      # for msi target"). Skip MSI on Windows betas and ship NSIS `.exe`
      # only. Stable releases (built by release-desktop.yml on
      # `v[0-9]*` tags) still produce both NSIS and MSI because their
      # version has no pre-release identifier.
      - name: Build Tauri app and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}${{ matrix.target == 'x86_64-pc-windows-msvc' && ' --bundles nsis' || '' }}

      # HS-8868 — fail the signed-bundle job if the produced .app/installer can't
      # launch (real Node sidecar + bootable server resources). The npm-package
      # smoke job below never touches the desktop bundle, so this is the only
      # check guarding the HS-8867 0-byte-sidecar class on the shipped artifact.
      - run: node scripts/verify-bundle.mjs ${{ matrix.target }}
        shell: bash

  # === Phase 5: Smoke tests (both tag types) ===
  #
  # Per HS-8464 follow-up decision: betas run the same smoke matrix as
  # RCs. The install/upgrade surface is the only path a user gets the
  # beta (via `npm install -g hotsheet@beta`) and is where the same
  # regression class HS-8457/8458 caught for RCs lurks for betas too.
  # Smoke runs AFTER publish so the npm artifact always exists for
  # debugging when smoke fails; the workflow goes red and the maintainer
  # can yank `--tag beta` manually if needed.
  #
  # Both jobs use the HS-8457 ready-poll pattern (capture stdout, poll
  # `/` for up to 30s, dump the log on failure) so a future silent-exit
  # regression on the npm-install symlink path is visible in the CI log
  # instead of looking like a slow boot.

  smoke-fresh:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Install beta globally and start server
        run: |
          for i in 1 2 3 4 5; do
            npm install -g hotsheet@${{ needs.publish.outputs.version }} && break
            echo "Attempt $i failed, waiting 15s for npm registry propagation..."
            sleep 15
          done
          hotsheet --data-dir /tmp/smoke-fresh --no-open --port 4195 > /tmp/hotsheet-fresh.log 2>&1 &
          HS_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4195/ > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            if ! kill -0 $HS_PID 2>/dev/null; then
              echo "::error::Server process died before binding to port 4195"
              echo "--- server log ---"
              cat /tmp/hotsheet-fresh.log
              exit 1
            fi
            sleep 1
          done
          echo "::error::Server did not bind to port 4195 within 30s"
          echo "--- server log ---"
          cat /tmp/hotsheet-fresh.log
          exit 1

      - name: Run fresh install smoke tests
        run: SMOKE_PORT=4195 npx playwright test --config playwright.config.smoke.ts e2e/smoke/fresh-install.spec.ts

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/hotsheet-fresh.log 2>/dev/null || echo "no log"

      - name: Stop server
        if: always()
        run: kill $(lsof -ti:4195) 2>/dev/null || true

  smoke-upgrade:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npx playwright install chromium --with-deps

      # Upgrade path: latest production stable → published beta. `npm
      # install -g hotsheet` (no version) resolves the `latest` dist-tag.
      - name: Install stable version and seed data
        run: |
          npm install -g hotsheet
          hotsheet --data-dir /tmp/smoke-upgrade --no-open --port 4195 > /tmp/hotsheet-stable.log 2>&1 &
          HS_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4195/ > /dev/null 2>&1; then break; fi
            if ! kill -0 $HS_PID 2>/dev/null; then
              echo "::error::Stable hotsheet died before binding"; cat /tmp/hotsheet-stable.log; exit 1
            fi
            sleep 1
          done
          bash scripts/seed-upgrade-data.sh 4195
          kill $(lsof -ti:4195) 2>/dev/null || true
          sleep 2

      - name: Upgrade to beta and start server
        run: |
          for i in 1 2 3 4 5; do
            npm install -g hotsheet@${{ needs.publish.outputs.version }} && break
            echo "Attempt $i failed, waiting 15s for npm registry propagation..."
            sleep 15
          done
          hotsheet --data-dir /tmp/smoke-upgrade --no-open --port 4195 > /tmp/hotsheet-upgrade.log 2>&1 &
          HS_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4195/ > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            if ! kill -0 $HS_PID 2>/dev/null; then
              echo "::error::Server process died before binding to port 4195"
              echo "--- server log ---"
              cat /tmp/hotsheet-upgrade.log
              exit 1
            fi
            sleep 1
          done
          echo "::error::Server did not bind to port 4195 within 30s"
          echo "--- server log ---"
          cat /tmp/hotsheet-upgrade.log
          exit 1

      - name: Run upgrade smoke tests
        run: SMOKE_PORT=4195 npx playwright test --config playwright.config.smoke.ts e2e/smoke/upgrade-install.spec.ts

      - name: Dump server log on failure
        if: failure()
        run: |
          echo "--- stable log ---"; cat /tmp/hotsheet-stable.log 2>/dev/null || echo "(none)"
          echo "--- upgrade log ---"; cat /tmp/hotsheet-upgrade.log 2>/dev/null || echo "(none)"

      - name: Stop server
        if: always()
        run: kill $(lsof -ti:4195) 2>/dev/null || true

  # === Phase 6 (rc-only): Promote to clean stable + dispatch desktop release ===
  #
  # Only RC tags reach this phase — beta tags stay on the `beta` dist-tag.
  # Publishes the clean `0.17.X` stable to npm (also via OIDC trusted
  # publishing, no token), creates the matching `v0.17.X` tag carrying
  # the RC tag's notes, and dispatches `release-desktop.yml` to produce
  # the signed Tauri bundles for the stable release.

  promote:
    if: contains(github.ref, '-rc.')
    needs: [publish, smoke-fresh, smoke-upgrade]
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6
        with:
          ref: '${{ github.ref }}'
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci

      # See `publish` job for why this matters — npm 10.x can't do OIDC
      # trusted publishing for the PUT itself.
      - name: Upgrade npm for OIDC trusted publishing (>=11.5.1)
        run: npm install -g npm@latest

      - name: Publish clean release version to npm
        run: |
          npm version "${{ needs.publish.outputs.base_version }}" --no-git-tag-version --allow-same-version
          npm run build
          npm publish --provenance --access public
          echo "Published hotsheet@${{ needs.publish.outputs.base_version }} to npm"

      - name: Create final release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          FINAL_TAG="v${{ needs.publish.outputs.base_version }}"
          RC_TAG="${GITHUB_REF_NAME}"
          NOTES=$(git tag -l --format='%(contents)' "$RC_TAG")
          echo "$NOTES" | git tag -a "$FINAL_TAG" -F -
          git push origin "$FINAL_TAG"
          echo "Created and pushed $FINAL_TAG"

      - name: Trigger desktop release
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release-desktop.yml',
              ref: 'main',
              inputs: { tag: 'v${{ needs.publish.outputs.base_version }}' },
            });
            console.log('Triggered desktop release for v${{ needs.publish.outputs.base_version }}');

  # === Phase 7 (beta-only): Flip the beta prerelease from draft → published ===
  #
  # HS-8465 — atomic publication. The beta `create-release` job above
  # creates the prerelease as a draft so the `build` matrix can upload
  # every signed Tauri bundle into an invisible release shell. Only
  # after every platform's `build` has uploaded its bundles do we flip
  # `draft:false`, making the prerelease page publicly visible with
  # every embedded download link already resolvable.
  #
  # `prerelease: true` stays set — this release should NOT become
  # GitHub's `releases/latest` (the Tauri updater + §50 upgrade nudge
  # keep pointing at the prior stable). Drafting closes the
  # broken-link window; the prerelease flag protects the stable
  # channel. The two are orthogonal.
  #
  # RC tags don't need a flip job here — they don't create a GitHub
  # Release in this workflow at all. The RC `promote` phase dispatches
  # release-desktop.yml which owns its own draft → flip cycle for the
  # final stable release.
  publish-release:
    if: contains(github.ref, '-beta.')
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Flip prerelease from draft → published
        uses: actions/github-script@v9
        with:
          script: |
            const releaseId = ${{ needs.create-release.outputs.release_id }};
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              draft: false,
              prerelease: true,
              make_latest: 'false',
            });
            console.log(`Beta prerelease ${releaseId} flipped from draft → published`);
