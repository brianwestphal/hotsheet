<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hot Sheet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #8888a8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-user-select: none;
    }
    .loading {
      text-align: center;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #2a2a4a;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    p {
      font-size: 14px;
      letter-spacing: 0.02em;
    }
    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: #686888;
    }
    .hint a {
      color: #818cf8;
      cursor: pointer;
      text-decoration: underline;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>Starting Hot Sheet&hellip;</p>
    <p id="slow-hint" class="hint hidden">
      Taking longer than expected. <a onclick="openFolder()">Open a different folder</a>
    </p>
  </div>
  <script>
    // Show hint after 10 seconds if still on this page
    setTimeout(function() {
      document.getElementById('slow-hint').classList.remove('hidden');
    }, 10000);

    // Handle File > Open Folder menu on the loading screen
    async function openFolder() {
      try {
        var folder = await window.__TAURI__.core.invoke('pick_folder');
        if (!folder) return;
        await window.__TAURI__.core.invoke('open_project', { dataDir: folder + '/.hotsheet' });
      } catch (e) {
        console.error('open_project failed:', e);
      }
    }
    window.addEventListener('app:open-folder', function() { openFolder(); });
  </script>
</body>
</html>
